<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap的使用</title>
    <!-- 引用 Bootstrap 網頁的 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
</head>
<body>
    <div class="container">

    <div class="p-5 mb-4 bg-light rounded-3">
        <div class="container-fluid py-5">
            <h1 class="display-5 fw-bold">Bootstrap 的使用</h1>
            <p class="col-md-8 fs-4">Bootstrap 是全球最流行的前端開源工具包，它支援 Sass 變數和 mixins、響應式網格系統、大量的預建元件和強大的 JavaScript
                外掛，助你快速設計和自定義響應式、移動裝置優先的站點。</p>
            <button class="btn btn-primary btn-lg" type="button">開始</button>
        </div>
    </div>

    <div class="row">
        <!-- 欄位大小以12等分表示，若沒有輸入欄位大小，則自動分配成相同大小 -->
        <div class="col">col</div>
        <div class="col">col</div>
        <div class="col">col</div>
    </div>
