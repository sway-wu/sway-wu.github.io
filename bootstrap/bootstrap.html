<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap的使用</title>
    <!-- 引用 Bootstrap 網頁的 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
</head>
<body>
    <h1>Bootstrap的使用</h1>
    <p>Bootstrap 是全球最流行的前端開源工具包，它支援 Sass 變數和 mixins、響應式網格系統、大量的預建元件和強大的 JavaScript 外掛，助你快速設計和自定義響應式、移動裝置優先的站點。</p>
    <button type="button" class="btn btn-secondary">Start</button>
    <!-- 因為js會從記憶體抓資料，為了避免出錯，因此將它擺在html的最後面 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js" integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf" crossorigin="anonymous"></script>
</body>
</html>
